<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 900" width="700" height="900">
  <defs>

    <!-- ── Gradientes de tecido ─────────────────────────────── -->
    <!-- Corpo principal: luz difusa vinda do topo esquerdo -->
    <radialGradient id="G-body" cx="38%" cy="20%" r="78%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="42%"  stop-color="#f9f9f9"/>
      <stop offset="75%"  stop-color="#f2f2f2"/>
      <stop offset="100%" stop-color="#e9e9e9"/>
    </radialGradient>

    <!-- Lateral esquerda do corpo: sombra de queda -->
    <linearGradient id="G-side-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Lateral direita do corpo -->
    <linearGradient id="G-side-r" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Manga esquerda: sombra diagonal (luz de cima) -->
    <linearGradient id="G-sl" x1="0%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%"   stop-color="#e6e6e6"/>
      <stop offset="35%"  stop-color="#eeeeee"/>
      <stop offset="70%"  stop-color="#f4f4f4"/>
      <stop offset="100%" stop-color="#f8f8f8"/>
    </linearGradient>

    <!-- Manga direita: espelho -->
    <linearGradient id="G-sr" x1="100%" y1="0%" x2="15%" y2="100%">
      <stop offset="0%"   stop-color="#e6e6e6"/>
      <stop offset="35%"  stop-color="#eeeeee"/>
      <stop offset="70%"  stop-color="#f4f4f4"/>
      <stop offset="100%" stop-color="#f8f8f8"/>
    </linearGradient>

    <!-- Gola: tom mais escuro, rib de elastano -->
    <linearGradient id="G-collar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e2e2e2"/>
      <stop offset="100%" stop-color="#d5d5d5"/>
    </linearGradient>

    <!-- Fundo backdrop fotográfico -->
    <radialGradient id="G-bg" cx="50%" cy="40%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#f9f9f9"/>
      <stop offset="100%" stop-color="#efefef"/>
    </radialGradient>

    <!-- ── Filtros ────────────────────────────────────────────── -->
    <!-- Sombra da camiseta na superfície -->
    <filter id="F-drop" x="-8%" y="-4%" width="116%" height="114%">
      <feDropShadow dx="0" dy="10" stdDeviation="22"
                    flood-color="#000000" flood-opacity="0.13"/>
    </filter>

    <!-- Sombra suave interna (borda da silhueta) -->
    <filter id="F-inner-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feFlood flood-color="#000000" flood-opacity="0.08" result="flood"/>
      <feComposite in="flood" in2="SourceAlpha" operator="in" result="shadow"/>
      <feGaussianBlur in="shadow" stdDeviation="6" result="blurred"/>
      <feMerge><feMergeNode in="blurred"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Textura de malha/algodão (visível de perto) -->
    <pattern id="P-cotton" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="none"/>
      <line x1="0" y1="2.5" x2="5" y2="2.5" stroke="rgba(0,0,0,0.012)" stroke-width="0.6"/>
      <line x1="2.5" y1="0" x2="2.5" y2="5" stroke="rgba(0,0,0,0.012)" stroke-width="0.6"/>
    </pattern>

    <!-- Highlight especular diagonal (brilho do tecido) -->
    <linearGradient id="G-specular" x1="15%" y1="8%" x2="85%" y2="92%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
      <stop offset="30%"  stop-color="rgba(255,255,255,0.38)"/>
      <stop offset="60%"  stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Clip para limitar highlight ao corpo -->
    <clipPath id="C-body">
      <path d="M 96,158 C 158,132 210,120 248,122 Q 296,198 350,199 Q 404,198 452,122
               C 490,120 542,132 604,158 L 606,312 L 612,876 L 88,876 L 94,312 Z"/>
    </clipPath>

  </defs>

  <!-- Fundo transparente — renderizado sobre o dark background do stage -->

  <!-- ══════════════════════════════════════════════════════════
       CAMISETA
  ══════════════════════════════════════════════════════════ -->
  <g filter="url(#F-drop)">

    <!-- ── MANGA ESQUERDA ──────────────────────────────────── -->
    <path id="sleeve-l"
      d="M 96,158
         L 94,275
         C 94,285 88,290 80,292
         L 28,300
         C 16,302 10,295 14,283
         L 44,210
         C 54,190 72,170 96,158 Z"
      fill="url(#G-sl)" stroke="#d0d0d0" stroke-width="0.7"/>

    <!-- Vinco de dobra na barra da manga esquerda -->
    <path d="M 14,283 C 18,290 26,298 36,296 L 80,292"
          fill="rgba(0,0,0,0.045)" stroke="none"/>

    <!-- Barra da manga esquerda -->
    <path d="M 12,282 C 14,291 22,299 34,297 L 80,290 L 80,295 L 32,301 C 18,303 10,294 12,285 Z"
          fill="#e0e0e0"/>

    <!-- Sombra na base da manga esquerda (onde encontra o corpo) -->
    <path d="M 94,260 C 90,270 88,285 94,295 L 96,275"
          fill="rgba(0,0,0,0.04)" stroke="none"/>

    <!-- ── MANGA DIREITA ──────────────────────────────────── -->
    <path id="sleeve-r"
      d="M 604,158
         L 606,275
         C 606,285 612,290 620,292
         L 672,300
         C 684,302 690,295 686,283
         L 656,210
         C 646,190 628,170 604,158 Z"
      fill="url(#G-sr)" stroke="#d0d0d0" stroke-width="0.7"/>

    <!-- Vinco de dobra na barra da manga direita -->
    <path d="M 686,283 C 682,290 674,298 664,296 L 620,292"
          fill="rgba(0,0,0,0.045)" stroke="none"/>

    <!-- Barra da manga direita -->
    <path d="M 688,282 C 686,291 678,299 666,297 L 620,290 L 620,295 L 668,301 C 682,303 690,294 688,285 Z"
          fill="#e0e0e0"/>

    <!-- Sombra na base da manga direita -->
    <path d="M 606,260 C 610,270 612,285 606,295 L 604,275"
          fill="rgba(0,0,0,0.04)" stroke="none"/>

    <!-- ── CORPO PRINCIPAL ────────────────────────────────── -->
    <!-- Forma base com recorte do decote -->
    <path id="body"
      d="M 96,158
         C 158,132 210,120 248,122
         Q 296,198 350,199
         Q 404,198 452,122
         C 490,120 542,132 604,158
         L 606,312
         L 612,876
         L 88,876
         L 94,312
         Z"
      fill="url(#G-body)" stroke="#d0d0d0" stroke-width="0.6"/>

    <!-- Sombra lateral esquerda (queda de luz) -->
    <rect x="88" y="158" width="42" height="718"
          fill="url(#G-side-l)" opacity="0.55"/>

    <!-- Sombra lateral direita -->
    <rect x="570" y="158" width="42" height="718"
          fill="url(#G-side-r)" opacity="0.55"/>

    <!-- Textura de algodão sobre o corpo -->
    <path d="M 96,158 C 158,132 210,120 248,122 Q 296,198 350,199 Q 404,198 452,122
             C 490,120 542,132 604,158 L 606,312 L 612,876 L 88,876 L 94,312 Z"
          fill="url(#P-cotton)" opacity="0.6"/>

    <!-- Highlight especular (brilho do tecido premium) -->
    <rect x="88" y="158" width="524" height="718"
          fill="url(#G-specular)" clip-path="url(#C-body)" opacity="0.7"/>

    <!-- Costura central (muito sutil) -->
    <line x1="350" y1="200" x2="350" y2="870"
          stroke="rgba(0,0,0,0.025)" stroke-width="1.2" stroke-dasharray="none"/>

    <!-- Costura do ombro esquerdo -->
    <line x1="96" y1="158" x2="248" y2="122"
          stroke="rgba(0,0,0,0.04)" stroke-width="1"/>

    <!-- Costura do ombro direito -->
    <line x1="604" y1="158" x2="452" y2="122"
          stroke="rgba(0,0,0,0.04)" stroke-width="1"/>

    <!-- Sombra sob os ombros (profundidade 3D) -->
    <path d="M 96,158 C 120,165 145,168 160,175 L 156,200 C 140,190 115,185 88,178 Z"
          fill="rgba(0,0,0,0.04)"/>
    <path d="M 604,158 C 580,165 555,168 540,175 L 544,200 C 560,190 585,185 612,178 Z"
          fill="rgba(0,0,0,0.04)"/>

    <!-- Barra inferior -->
    <path d="M 88,864 C 200,860 500,860 612,864 L 612,876 L 88,876 Z"
          fill="#dedede"/>

    <!-- ── GOLA (decote redondo) ─────────────────────────── -->
    <!-- Borda externa da gola (tecido dobrado) -->
    <path d="M 248,122 Q 296,200 350,201 Q 404,200 452,122
             C 440,116 420,110 400,108
             C 385,106 365,106 350,106
             C 335,106 315,106 300,108
             C 280,110 260,116 248,122 Z"
          fill="url(#G-collar)"/>

    <!-- Rib interno da gola -->
    <path d="M 268,126 Q 308,194 350,195 Q 392,194 432,126
             C 418,122 400,118 380,116 C 370,115 360,115 350,115
             C 340,115 330,115 320,116 C 300,118 282,122 268,126 Z"
          fill="#d8d8d8"/>

    <!-- Linhas de rib (textura de elastano) -->
    <path d="M 278,130 Q 312,192 350,193" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" fill="none"/>
    <path d="M 288,127 Q 318,190 350,191" stroke="rgba(255,255,255,0.3)" stroke-width="0.7" fill="none"/>
    <path d="M 422,130 Q 388,192 350,193" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" fill="none"/>
    <path d="M 412,127 Q 382,190 350,191" stroke="rgba(255,255,255,0.3)" stroke-width="0.7" fill="none"/>

    <!-- ── ETIQUETA INTERNA (costas, visível no decote) ─── -->
    <!-- Fundo da etiqueta -->
    <rect x="328" y="112" width="44" height="28" rx="1.5"
          fill="#f0f0f0" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>

    <!-- Texto: MINIMAL CLUB -->
    <text x="350" y="122"
          font-family="'Arial Narrow', Arial, sans-serif"
          font-size="5.8" font-weight="700"
          text-anchor="middle" fill="#555555"
          letter-spacing="1.4" opacity="0.85">MINIMAL CLUB</text>

    <!-- Texto: material -->
    <text x="350" y="130"
          font-family="Arial, sans-serif"
          font-size="4.2" font-weight="400"
          text-anchor="middle" fill="#888888"
          letter-spacing="0.6" opacity="0.75">ALGODÃO EGÍPCIO</text>

    <!-- Texto: tamanho -->
    <text x="350" y="137"
          font-family="Arial, sans-serif"
          font-size="5.5" font-weight="600"
          text-anchor="middle" fill="#666666"
          letter-spacing="0.5" opacity="0.8">M</text>

    <!-- ── VINCOS DE USO (dobras sutis do tecido) ────────── -->
    <!-- Vinco diagonal esquerdo (dobra de ombro) -->
    <path d="M 165,220 C 200,310 215,450 200,620"
          stroke="rgba(0,0,0,0.03)" stroke-width="2.5"
          stroke-linecap="round" fill="none"/>

    <!-- Vinco diagonal direito -->
    <path d="M 535,220 C 500,310 485,450 500,620"
          stroke="rgba(0,0,0,0.03)" stroke-width="2.5"
          stroke-linecap="round" fill="none"/>

    <!-- Vinco horizontal central suave -->
    <path d="M 140,580 C 240,574 460,574 560,580"
          stroke="rgba(0,0,0,0.022)" stroke-width="1.5"
          stroke-linecap="round" fill="none"/>

    <!-- Vinco horizontal inferior -->
    <path d="M 130,730 C 240,724 460,724 570,730"
          stroke="rgba(0,0,0,0.018)" stroke-width="1.2"
          stroke-linecap="round" fill="none"/>

  </g><!-- /g filter -->

</svg>
